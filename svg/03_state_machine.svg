<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 13px; fill: #666; }
      .state-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .state-desc { font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; fill: #555; }
      .transition-text { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .transition-sub { font-family: Arial, sans-serif; font-size: 9px; text-anchor: middle; fill: #666; }
      .arrow { stroke: #555; stroke-width: 2; fill: none; }
      .arrow-red { stroke: #C62828; stroke-width: 2.5; fill: none; }
      .arrow-green { stroke: #2E7D32; stroke-width: 2.5; fill: none; }
      .arrow-blue { stroke: #1565C0; stroke-width: 2.5; fill: none; }
      .arrow-orange { stroke: #E65100; stroke-width: 2.5; fill: none; }
      .arrow-purple { stroke: #7B1FA2; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62828"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E7D32"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565C0"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E65100"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B1FA2"/>
    </marker>
  </defs>

  <rect width="900" height="550" fill="#fafafa"/>

  <text x="450" y="35" text-anchor="middle" class="title">Machine a etats - Phases de charge (Vision 2)</text>
  <text x="450" y="55" text-anchor="middle" class="subtitle">BULK et ABSORPTION ont des seuils distincts</text>

  <!-- States -->
  <!-- IDLE -->
  <rect x="100" y="100" width="120" height="70" rx="10" fill="#ECEFF1" stroke="#546E7A" stroke-width="2"/>
  <text x="160" y="130" class="state-text" fill="#37474F">IDLE</text>
  <text x="160" y="148" class="state-desc">Aucune charge</text>
  <text x="160" y="160" class="state-desc">I = 0, V = OCV</text>

  <!-- BULK -->
  <rect x="350" y="100" width="140" height="80" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="3"/>
  <text x="420" y="130" class="state-text" fill="#0D47A1">BULK (CC)</text>
  <text x="420" y="148" class="state-desc">I = I_max = C/3.3</text>
  <text x="420" y="160" class="state-desc">V monte jusqu a V_bulk</text>
  <text x="420" y="172" class="state-desc" fill="#1565C0" font-weight="bold">V_bulk = 2.30 V/el</text>

  <!-- ABSORPTION -->
  <rect x="620" y="100" width="160" height="80" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="3"/>
  <text x="700" y="130" class="state-text" fill="#BF360C">ABSORPTION (CV)</text>
  <text x="700" y="148" class="state-desc">V = V_abs constant</text>
  <text x="700" y="160" class="state-desc">I decroit jusqu a I_end</text>
  <text x="700" y="172" class="state-desc" fill="#E65100" font-weight="bold">V_abs = 2.35 V/el</text>

  <!-- FLOATING -->
  <rect x="350" y="280" width="140" height="80" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3"/>
  <text x="420" y="310" class="state-text" fill="#1B5E20">FLOATING</text>
  <text x="420" y="328" class="state-desc">V = V_float constant</text>
  <text x="420" y="340" class="state-desc">I = I_float = C/333</text>
  <text x="420" y="352" class="state-desc" fill="#2E7D32" font-weight="bold">V_float = 2.25 V/el</text>

  <!-- EQUALIZATION -->
  <rect x="620" y="280" width="160" height="80" rx="10" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="3"/>
  <text x="700" y="310" class="state-text" fill="#4A148C">EQUALIZATION</text>
  <text x="700" y="328" class="state-desc">V = V_equal constant</text>
  <text x="700" y="340" class="state-desc">Duree limitee (2h)</text>
  <text x="700" y="352" class="state-desc" fill="#7B1FA2" font-weight="bold">Liquide uniquement</text>

  <!-- Transitions -->
  <!-- IDLE -> BULK -->
  <line x1="220" y1="135" x2="340" y2="135" class="arrow-blue" marker-end="url(#arrow-blue)"/>
  <text x="280" y="125" class="transition-text" fill="#1565C0">Detection charge</text>
  <text x="280" y="138" class="transition-sub">I &gt; 0.05A</text>

  <!-- BULK -> ABSORPTION -->
  <line x1="490" y1="135" x2="610" y2="135" class="arrow-orange" marker-end="url(#arrow-orange)"/>
  <text x="550" y="125" class="transition-text" fill="#E65100">V &gt;= V_bulk_threshold</text>
  <text x="550" y="138" class="transition-sub">2.30 V/el (13.8V @ 12V)</text>

  <!-- ABSORPTION -> FLOATING -->
  <path d="M 660 180 C 660 220, 580 250, 560 280" class="arrow-green" marker-end="url(#arrow-green)" fill="none"/>
  <text x="640" y="240" class="transition-text" fill="#2E7D32">I &lt;= I_end</text>
  <text x="640" y="253" class="transition-sub" fill="#2E7D32">ET t &gt;= 1h</text>

  <!-- ABSORPTION -> FLOATING (timeout) -->
  <path d="M 700 180 C 700 210, 600 250, 520 300" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>
  <text x="740" y="210" class="transition-sub">t &gt;= 8h (timeout)</text>

  <!-- FLOATING -> EQUALIZATION -->
  <line x1="490" y1="320" x2="610" y2="320" class="arrow-purple" marker-end="url(#arrow-purple)"/>
  <text x="550" y="310" class="transition-text" fill="#7B1FA2">Equalization autorisee</text>
  <text x="550" y="323" class="transition-sub">SOC=100% + 30j + liquide</text>

  <!-- EQUALIZATION -> FLOATING -->
  <line x1="700" y1="280" x2="700" y2="250" class="arrow-green" marker-end="url(#arrow-green)"/>
  <text x="750" y="265" class="transition-text" fill="#2E7D32">t &gt;= 2h</text>

  <!-- FLOATING -> BULK (restart) -->
  <path d="M 350 320 C 250 320, 250 250, 250 180 C 250 140, 300 140, 340 140" class="arrow-blue" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="220" y="260" class="transition-text" fill="#1565C0">V &lt; V_reconnect</text>
  <text x="220" y="273" class="transition-sub">Nouveau cycle</text>

  <!-- Vision 2 highlight box -->
  <rect x="330" y="75" width="460" height="120" fill="none" stroke="#FF5722" stroke-width="2" stroke-dasharray="8,4" rx="5"/>
  <text x="560" y="70" text-anchor="middle" class="subtitle" fill="#FF5722" font-weight="bold" font-size="13">&lt;- Vision 2 : BULK (2.30V/el) et ABSORPTION (2.35V/el) sont DISTINCTS -&gt;</text>

  <!-- Bottom info -->
  <rect x="80" y="420" width="740" height="100" fill="white" stroke="#ddd" rx="5"/>
  <text x="90" y="445" class="subtitle" font-weight="bold" font-size="13">Parametres AGM 12V @ 25C :</text>
  <text x="90" y="465" class="subtitle">- V_bulk_threshold = 2.30 V/el (13.8V) - seuil de transition BULK -&gt; ABSORPTION</text>
  <text x="90" y="482" class="subtitle">- V_absorption = 2.35 V/el (14.1V) - tension maintenue en phase CV</text>
  <text x="90" y="499" class="subtitle">- V_floating = 2.25 V/el (13.5V) - tension d entretien</text>
  <text x="90" y="516" class="subtitle">- I_abs_end = 0.02C (2A @ 100Ah) - courant de fin d absorption</text>
</svg>