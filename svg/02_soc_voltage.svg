<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
      .axis-label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .legend-text { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
      .grid { stroke: #e0e0e0; stroke-width: 0.5; }
      .axis { stroke: #333; stroke-width: 1.5; }
      .line-sn { stroke: #2196F3; stroke-width: 2.5; fill: none; }
      .line-ca { stroke: #FF9800; stroke-width: 2.5; fill: none; }
      .line-agm { stroke: #4CAF50; stroke-width: 2.5; fill: none; }
      .line-gel { stroke: #9C27B0; stroke-width: 2.5; fill: none; }
      .zone-critical { fill: #FFEBEE; opacity: 0.5; }
      .zone-low { fill: #FFF3E0; opacity: 0.4; }
      .zone-good { fill: #E8F5E9; opacity: 0.3; }
    </style>
  </defs>

  <rect width="900" height="500" fill="#fafafa"/>

  <text x="450" y="30" text-anchor="middle" class="title">Tension OCV vs SOC — Toutes technologies @ 25°C</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Tension au repos (batterie déconnectée > 2h)</text>

  <!-- Plot area -->
  <rect x="80" y="70" width="640" height="340" fill="white" stroke="#ccc" stroke-width="1"/>

  <!-- Zones -->
  <rect x="80" y="70" width="64" height="340" class="zone-critical"/>
  <rect x="144" y="70" width="64" height="340" class="zone-low"/>
  <rect x="208" y="70" width="192" height="340" class="zone-good"/>
  <rect x="400" y="70" width="320" height="340" class="zone-good"/>

  <!-- Zone labels -->
  <text x="112" y="90" text-anchor="middle" class="subtitle" fill="#C62828">CRITIQUE</text>
  <text x="112" y="105" text-anchor="middle" class="subtitle" fill="#C62828">&lt; 10%</text>
  <text x="176" y="90" text-anchor="middle" class="subtitle" fill="#EF6C00">FAIBLE</text>
  <text x="176" y="105" text-anchor="middle" class="subtitle" fill="#EF6C00">10-20%</text>

  <!-- Grid -->
  <line x1="80" y1="130" x2="720" y2="130" class="grid"/>
  <line x1="80" y1="190" x2="720" y2="190" class="grid"/>
  <line x1="80" y1="250" x2="720" y2="250" class="grid"/>
  <line x1="80" y1="310" x2="720" y2="310" class="grid"/>
  <line x1="80" y1="370" x2="720" y2="370" class="grid"/>

  <line x1="144" y1="70" x2="144" y2="410" class="grid"/>
  <line x1="208" y1="70" x2="208" y2="410" class="grid"/>
  <line x1="272" y1="70" x2="272" y2="410" class="grid"/>
  <line x1="336" y1="70" x2="336" y2="410" class="grid"/>
  <line x1="400" y1="70" x2="400" y2="410" class="grid"/>
  <line x1="464" y1="70" x2="464" y2="410" class="grid"/>
  <line x1="528" y1="70" x2="528" y2="410" class="grid"/>
  <line x1="592" y1="70" x2="592" y2="410" class="grid"/>
  <line x1="656" y1="70" x2="656" y2="410" class="grid"/>

  <!-- Axes -->
  <line x1="80" y1="410" x2="720" y2="410" class="axis"/>
  <line x1="80" y1="70" x2="80" y2="410" class="axis"/>

  <!-- Y labels (V/element) -->
  <text x="70" y="415" text-anchor="end" class="axis-label">1.7</text>
  <text x="70" y="375" text-anchor="end" class="axis-label">1.8</text>
  <text x="70" y="315" text-anchor="end" class="axis-label">1.9</text>
  <text x="70" y="255" text-anchor="end" class="axis-label">2.0</text>
  <text x="70" y="195" text-anchor="end" class="axis-label">2.1</text>
  <text x="70" y="135" text-anchor="end" class="axis-label">2.2</text>

  <text x="25" y="240" text-anchor="middle" class="axis-label" transform="rotate(-90 25 240)">Tension [V/élément]</text>

  <!-- X labels (SOC) -->
  <text x="80" y="430" text-anchor="middle" class="axis-label">0%</text>
  <text x="144" y="430" text-anchor="middle" class="axis-label">10%</text>
  <text x="208" y="430" text-anchor="middle" class="axis-label">20%</text>
  <text x="272" y="430" text-anchor="middle" class="axis-label">30%</text>
  <text x="336" y="430" text-anchor="middle" class="axis-label">40%</text>
  <text x="400" y="430" text-anchor="middle" class="axis-label">50%</text>
  <text x="464" y="430" text-anchor="middle" class="axis-label">60%</text>
  <text x="528" y="430" text-anchor="middle" class="axis-label">70%</text>
  <text x="592" y="430" text-anchor="middle" class="axis-label">80%</text>
  <text x="656" y="430" text-anchor="middle" class="axis-label">90%</text>
  <text x="720" y="430" text-anchor="middle" class="axis-label">100%</text>

  <text x="400" y="455" text-anchor="middle" class="axis-label">État de charge (SOC)</text>

  <!-- Curves -->
  <!-- Sn-Pb Liquide -->
  <path d="M 80 370 L 144 310 L 208 250 L 272 220 L 336 190 L 400 160 L 464 130 L 528 100 L 592 70 L 656 40 L 720 10" class="line-sn"/>

  <!-- CA-Pb Liquide (same as Sn-Pb) -->
  <path d="M 80 370 L 144 310 L 208 250 L 272 220 L 336 190 L 400 160 L 464 130 L 528 100 L 592 70 L 656 40 L 720 10" class="line-ca" opacity="0"/>

  <!-- AGM (+0.01V) -->
  <path d="M 80 365 L 144 305 L 208 245 L 272 215 L 336 185 L 400 155 L 464 125 L 528 95 L 592 65 L 656 35 L 720 5" class="line-agm"/>

  <!-- GEL (+0.02V) -->
  <path d="M 80 360 L 144 300 L 208 240 L 272 210 L 336 180 L 400 150 L 464 120 L 528 90 L 592 60 L 656 30 L 720 0" class="line-gel"/>

  <!-- Legend -->
  <rect x="740" y="80" width="150" height="130" fill="white" stroke="#ccc" rx="5"/>
  <line x1="755" y1="100" x2="785" y2="100" class="line-sn"/>
  <text x="795" y="104" class="legend-text">Sn-Pb Liquide</text>
  <line x1="755" y1="125" x2="785" y2="125" class="line-ca"/>
  <text x="795" y="129" class="legend-text">Ca-Pb Liquide</text>
  <line x1="755" y1="150" x2="785" y2="150" class="line-agm"/>
  <text x="795" y="154" class="legend-text">AGM</text>
  <line x1="755" y1="175" x2="785" y2="175" class="line-gel"/>
  <text x="795" y="179" class="legend-text">GEL</text>

  <!-- Voltage table for 12V/24V/48V -->
  <rect x="80" y="470" width="640" height="20" fill="#f5f5f5" stroke="#ddd"/>
  <text x="90" y="484" class="subtitle" font-weight="bold">12V (6él):</text>
  <text x="160" y="484" class="subtitle">vide=10.5V</text>
  <text x="240" y="484" class="subtitle">50%=12.3V</text>
  <text x="320" y="484" class="subtitle">pleine=12.9V</text>

  <text x="420" y="484" class="subtitle" font-weight="bold">24V (12él):</text>
  <text x="500" y="484" class="subtitle">vide=21.0V</text>
  <text x="580" y="484" class="subtitle">50%=24.6V</text>
  <text x="660" y="484" class="subtitle">pleine=25.8V</text>
</svg>