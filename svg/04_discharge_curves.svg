<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
      .axis-label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .legend-text { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
      .grid { stroke: #e0e0e0; stroke-width: 0.5; }
      .axis { stroke: #333; stroke-width: 1.5; }
      .line-c100 { stroke: #4CAF50; stroke-width: 2.5; fill: none; }
      .line-c50 { stroke: #2196F3; stroke-width: 2.5; fill: none; }
      .line-c20 { stroke: #FF9800; stroke-width: 2.5; fill: none; }
      .line-c10 { stroke: #F44336; stroke-width: 2.5; fill: none; }
      .line-c5 { stroke: #9C27B0; stroke-width: 2.5; fill: none; }
      .zone-cutoff { fill: #FFEBEE; opacity: 0.6; }
      .cutoff-line { stroke: #C62828; stroke-width: 2; stroke-dasharray: 6,3; }
    </style>
  </defs>

  <rect width="900" height="550" fill="#fafafa"/>

  <text x="450" y="30" text-anchor="middle" class="title">Courbes de decharge - AGM 12V @ 25C</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Tension de delestage vs DOD pour differents C-rates</text>

  <!-- Plot area -->
  <rect x="80" y="70" width="640" height="360" fill="white" stroke="#ccc" stroke-width="1"/>

  <!-- Cutoff zone -->
  <rect x="80" y="370" width="640" height="60" class="zone-cutoff"/>
  <text x="400" y="410" text-anchor="middle" class="subtitle" fill="#C62828" font-weight="bold">ZONE DE COUPURE - DOD &gt; 80% deconseille</text>

  <!-- Grid -->
  <line x1="80" y1="130" x2="720" y2="130" class="grid"/>
  <line x1="80" y1="190" x2="720" y2="190" class="grid"/>
  <line x1="80" y1="250" x2="720" y2="250" class="grid"/>
  <line x1="80" y1="310" x2="720" y2="310" class="grid"/>
  <line x1="80" y1="370" x2="720" y2="370" class="grid"/>

  <line x1="144" y1="70" x2="144" y2="430" class="grid"/>
  <line x1="208" y1="70" x2="208" y2="430" class="grid"/>
  <line x1="272" y1="70" x2="272" y2="430" class="grid"/>
  <line x1="336" y1="70" x2="336" y2="430" class="grid"/>
  <line x1="400" y1="70" x2="400" y2="430" class="grid"/>
  <line x1="464" y1="70" x2="464" y2="430" class="grid"/>
  <line x1="528" y1="70" x2="528" y2="430" class="grid"/>
  <line x1="592" y1="70" x2="592" y2="430" class="grid"/>
  <line x1="656" y1="70" x2="656" y2="430" class="grid"/>

  <!-- Axes -->
  <line x1="80" y1="430" x2="720" y2="430" class="axis"/>
  <line x1="80" y1="70" x2="80" y2="430" class="axis"/>

  <!-- Y labels (Voltage 12V) -->
  <text x="70" y="435" text-anchor="end" class="axis-label">9</text>
  <text x="70" y="375" text-anchor="end" class="axis-label">10</text>
  <text x="70" y="315" text-anchor="end" class="axis-label">11</text>
  <text x="70" y="255" text-anchor="end" class="axis-label">12</text>
  <text x="70" y="195" text-anchor="end" class="axis-label">13</text>
  <text x="70" y="135" text-anchor="end" class="axis-label">14</text>
  <text x="70" y="75" text-anchor="end" class="axis-label">15</text>

  <text x="25" y="250" text-anchor="middle" class="axis-label" transform="rotate(-90 25 250)">Tension [V] - AGM 12V</text>

  <!-- X labels (DOD) -->
  <text x="80" y="450" text-anchor="middle" class="axis-label">0%</text>
  <text x="144" y="450" text-anchor="middle" class="axis-label">10%</text>
  <text x="208" y="450" text-anchor="middle" class="axis-label">20%</text>
  <text x="272" y="450" text-anchor="middle" class="axis-label">30%</text>
  <text x="336" y="450" text-anchor="middle" class="axis-label">40%</text>
  <text x="400" y="450" text-anchor="middle" class="axis-label">50%</text>
  <text x="464" y="450" text-anchor="middle" class="axis-label">60%</text>
  <text x="528" y="450" text-anchor="middle" class="axis-label">70%</text>
  <text x="592" y="450" text-anchor="middle" class="axis-label">80%</text>
  <text x="656" y="450" text-anchor="middle" class="axis-label">90%</text>
  <text x="720" y="450" text-anchor="middle" class="axis-label">100%</text>

  <text x="400" y="475" text-anchor="middle" class="axis-label">Profondeur de decharge (DOD)</text>

  <!-- Cutoff line -->
  <line x1="80" y1="370" x2="720" y2="370" class="cutoff-line"/>
  <text x="730" y="375" class="axis-label" fill="#C62828">10.5V</text>

  <!-- C/100 curve (green) -->
  <polyline points="80,100 144,105 208,110 272,120 336,135 400,155 464,180 528,210 592,250 656,300 720,370" class="line-c100"/>

  <!-- C/50 curve (blue) -->
  <polyline points="80,105 144,112 208,120 272,132 336,150 400,172 464,200 528,235 592,280 656,335 720,370" class="line-c50"/>

  <!-- C/20 curve (orange) -->
  <polyline points="80,115 144,125 208,138 272,155 336,178 400,205 464,238 528,278 592,325 656,370 720,370" class="line-c20"/>

  <!-- C/10 curve (red) -->
  <polyline points="80,130 144,145 208,165 272,190 336,220 400,255 464,295 528,340 592,370 656,370 720,370" class="line-c10"/>

  <!-- C/5 curve (purple) -->
  <polyline points="80,155 144,178 208,205 272,238 336,278 400,320 464,360 528,370 592,370 656,370 720,370" class="line-c5"/>

  <!-- Legend -->
  <rect x="740" y="80" width="150" height="180" fill="white" stroke="#ccc" rx="5"/>
  <text x="750" y="100" class="legend-text" font-weight="bold">C-rate</text>
  <line x1="755" y1="115" x2="785" y2="115" class="line-c100"/>
  <text x="795" y="119" class="legend-text">C/100 (tres lent)</text>
  <line x1="755" y1="140" x2="785" y2="140" class="line-c50"/>
  <text x="795" y="144" class="legend-text">C/50</text>
  <line x1="755" y1="165" x2="785" y2="165" class="line-c20"/>
  <text x="795" y="169" class="legend-text">C/20 (standard)</text>
  <line x1="755" y1="190" x2="785" y2="190" class="line-c10"/>
  <text x="795" y="194" class="legend-text">C/10</text>
  <line x1="755" y1="215" x2="785" y2="215" class="line-c5"/>
  <text x="795" y="219" class="legend-text">C/5 (rapide)</text>

  <line x1="755" y1="240" x2="785" y2="240" class="cutoff-line"/>
  <text x="795" y="244" class="legend-text" fill="#C62828">Coupure (1.75V/el)</text>

  <!-- Info box -->
  <rect x="80" y="490" width="640" height="50" fill="#f5f5f5" stroke="#ddd" rx="5"/>
  <text x="90" y="510" class="subtitle" font-weight="bold">Observation :</text>
  <text x="90" y="528" class="subtitle">Plus le C-rate est eleve (decharge rapide), plus la tension chute vite pour un meme DOD.</text>
  <text x="90" y="546" class="subtitle">A DOD = 50% : C/100 -&gt; 12.4V | C/20 -&gt; 12.1V | C/5 -&gt; 11.4V</text>
</svg>